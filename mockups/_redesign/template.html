:root {
  /* DARK (default) */
  --bg-0:#07080A; --bg-1:#0E0F12; --bg-2:#16181D; --bg-3:#1F2229;
  --line:rgba(255,255,255,0.06); --line-2:rgba(255,255,255,0.12); --line-3:rgba(255,255,255,0.22);
  --ink-0:#F4F4F5; --ink-1:#9EA1A8; --ink-2:#6B6E76; --ink-3:#3F424A;
  --elev:0 1px 0 rgba(255,255,255,0.03) inset, 0 8px 30px rgba(0,0,0,0.45);

  /* accent — lavender default; overridden per [data-accent] below */
  --accent:#C4A6F7; --accent-hi:#D6C2FA; --accent-lo:#A57CF0; --accent-text:#C4A6F7; --accent-ink:#07080A;
  --accent-12:rgba(196,166,247,0.12); --accent-24:rgba(196,166,247,0.24); --accent-40:rgba(196,166,247,0.40);
  --accent-glow:rgba(196,166,247,0.40);

  --positive:#5BE584; --danger:#FF4D5E; --warn:#FFB547;
  --warn-12:rgba(255,181,71,0.12); --warn-40:rgba(255,181,71,0.40);

  --font-display:'Anton',sans-serif;
  --font-sans:'Space Grotesk',sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}

/* LIGHT THEME */
body.light {
  --bg-0:#EFEDE7; --bg-1:#FBFAF7; --bg-2:#F1EFE9; --bg-3:#E7E4DC;
  --line:rgba(20,18,14,0.07); --line-2:rgba(20,18,14,0.13); --line-3:rgba(20,18,14,0.24);
  --ink-0:#16151A; --ink-1:#56555C; --ink-2:#86848C; --ink-3:#B6B4BB;
  --elev:0 1px 0 rgba(255,255,255,0.6) inset, 0 8px 26px rgba(40,32,20,0.10);
  --accent-text:var(--accent-lo);
  --accent-ink:#FBFAF7;
}

/* ── Accent presets — set data-accent on the <html> root ── */
:root[data-accent="lavender"]{ --accent:#C4A6F7; --accent-hi:#D6C2FA; --accent-lo:#8B5CF6; --accent-text:#C4A6F7; --accent-12:rgba(196,166,247,.12); --accent-24:rgba(196,166,247,.24); --accent-40:rgba(196,166,247,.40); --accent-glow:rgba(196,166,247,.40); }
:root[data-accent="cyan"]{ --accent:#4FC3F7; --accent-hi:#8AD8FB; --accent-lo:#1F9FD8; --accent-text:#4FC3F7; --accent-12:rgba(79,195,247,.12); --accent-24:rgba(79,195,247,.24); --accent-40:rgba(79,195,247,.40); --accent-glow:rgba(79,195,247,.40); }
:root[data-accent="mint"]{ --accent:#5BE5A8; --accent-hi:#8FF0C4; --accent-lo:#1FB877; --accent-text:#5BE5A8; --accent-12:rgba(91,229,168,.12); --accent-24:rgba(91,229,168,.24); --accent-40:rgba(91,229,168,.40); --accent-glow:rgba(91,229,168,.40); }
:root[data-accent="coral"]{ --accent:#FF8A6B; --accent-hi:#FFB199; --accent-lo:#E5613D; --accent-text:#FF8A6B; --accent-12:rgba(255,138,107,.12); --accent-24:rgba(255,138,107,.24); --accent-40:rgba(255,138,107,.40); --accent-glow:rgba(255,138,107,.40); }
:root[data-accent="amber"]{ --accent:#FFC24D; --accent-hi:#FFD480; --accent-lo:#D99A1F; --accent-text:#FFC24D; --accent-12:rgba(255,194,77,.12); --accent-24:rgba(255,194,77,.24); --accent-40:rgba(255,194,77,.40); --accent-glow:rgba(255,194,77,.40); }
/* keep light-mode accent text legible */
body.light[data-light-text]{ --accent-text:var(--accent-lo); }
body.light :root, body.light{ --accent-text:var(--accent-lo); }

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
.mono{ font-family:var(--font-mono); }

/* ── Phone screen ── */
.screen{

.app-frame{ width:100%; max-width:440px; margin:0 auto; height:100dvh; background:var(--bg-0); color:var(--ink-0);
  font-family:var(--font-sans); position:relative; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 0 60px rgba(0,0,0,.5); }
.app-scroll{ flex:1; overflow-y:auto; overflow-x:hidden; padding:0 16px 18px; -webkit-overflow-scrolling:touch; }
.app-scroll::-webkit-scrollbar{ width:0; }
.app-frame .nav{ margin:0; flex:none; }
.screen-pad{ display:flex; flex-direction:column; }

/* route transition */
.route-enter{ animation:routeIn .26s cubic-bezier(.2,.7,.3,1); }
@keyframes routeIn{ from{ opacity:0; transform:translateX(14px); } to{ opacity:1; transform:none; } }
.route-back{ animation:routeBack .26s cubic-bezier(.2,.7,.3,1); }
@keyframes routeBack{ from{ opacity:0; transform:translateX(-14px); } to{ opacity:1; transform:none; } }

/* ── REDESIGNED WORKOUT CARD ── */
.wcard{ background:var(--bg-1); border:1px solid var(--line); border-radius:20px; overflow:hidden; box-shadow:var(--elev); margin-bottom:14px; }
.wc-head{ display:flex; align-items:center; gap:12px; padding:15px 16px 13px; }
.wc-av{ width:42px; height:42px; border-radius:50%; object-fit:cover; flex:none; }
.wc-av.txt{ background:var(--bg-3); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:16px; color:var(--ink-2); }
.wc-name{ font-family:var(--font-mono); font-weight:700; font-size:15px; line-height:1.1; }
.wc-sub{ font-family:var(--font-mono); font-size:11px; color:var(--ink-2); margin-top:3px; }
.wc-menu{ margin-left:auto; }

/* title band */
.wc-title-row{ display:flex; align-items:center; gap:10px; padding:0 16px 14px; }
.wc-title{ font-family:var(--font-display); font-size:19px; letter-spacing:.6px; line-height:1; }
.wc-type{ display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; color:var(--accent-text); background:var(--accent-12); border:1px solid var(--accent-24);
  padding:5px 10px; border-radius:999px; margin-left:auto; }

/* stat strip */
.wc-stats{ display:grid; grid-template-columns:repeat(4,1fr); border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
.wc-stat{ padding:13px 14px; border-left:1px solid var(--line); }
.wc-stat:first-child{ border-left:none; }
.wc-stat .v{ font-family:var(--font-display); font-size:21px; line-height:1; letter-spacing:.5px; display:flex; align-items:baseline; gap:3px; }
.wc-stat .v small{ font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--ink-2); }
.wc-stat.vol .v{ color:var(--accent-text); }
.wc-stat .k{ font-family:var(--font-mono); font-size:9px; letter-spacing:1.2px; text-transform:uppercase; color:var(--ink-2); margin-top:6px; }
.wc-stat .v .pr{ color:var(--warn); }

.wc-body{ padding:15px 16px 4px; }
.wc-tags{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.wc-tag{ font-family:var(--font-mono); font-size:12px; color:var(--ink-1); background:var(--bg-2); border:1px solid var(--line-2); border-radius:999px; padding:6px 12px; }

.wc-exhead{ font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-2); margin-bottom:4px; }

/* exercise row */
.wc-ex{ padding:12px 0; border-top:1px solid var(--line); }
.wc-ex:first-of-type{ border-top:none; }
.wc-ex-top{ display:flex; align-items:center; gap:9px; }
.wc-ex-count{ font-family:var(--font-mono); font-weight:700; font-size:12px; color:var(--ink-2); background:var(--bg-2);
  border:1px solid var(--line-2); border-radius:7px; padding:3px 8px; flex:none; }
.wc-ex-name{ font-family:var(--font-sans); font-weight:600; font-size:15px; min-width:0; }
.pr-tag{ font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:.5px; color:var(--warn);
  background:var(--warn-12); border:1px solid var(--warn-40); border-radius:6px; padding:3px 7px; display:inline-flex; align-items:center; gap:4px; }
.wc-ex-best{ margin-left:auto; font-family:var(--font-mono); font-weight:700; font-size:14px; white-space:nowrap; }
.wc-ex-best small{ font-weight:400; font-size:10px; color:var(--ink-3); }
.wc-sets{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; padding-left:1px; }
.wc-set{ font-family:var(--font-mono); font-size:12px; color:var(--ink-1); background:var(--bg-2); border:1px solid var(--line-2);
  border-radius:8px; padding:5px 9px; display:inline-flex; align-items:baseline; gap:4px; }
.wc-set b{ color:var(--ink-0); font-weight:700; }
.wc-set .reps{ color:var(--ink-3); font-size:10.5px; }
.wc-set.top{ background:var(--accent-12); border-color:var(--accent-24); }
.wc-set.top b{ color:var(--accent-text); }

.wc-foot{ display:flex; align-items:center; gap:10px; border-top:1px solid var(--line); padding:13px 16px; margin-top:11px; }
.wc-foot .pill{ display:flex; align-items:center; gap:7px; background:var(--bg-2); border:1px solid var(--line-2); border-radius:999px;
  padding:9px 13px; color:var(--ink-1); font-family:var(--font-mono); font-size:13px; cursor:pointer; transition:all .12s; }
.wc-foot .pill .cnt{ font-weight:700; color:var(--ink-0); }
.wc-foot .pill.fire.active{ background:var(--warn-12); border-color:var(--warn-40); }
.wc-foot .pill.fire.active .cnt{ color:var(--warn); }
.wc-foot .pill.saved{ background:var(--accent-12); border-color:var(--accent-24); color:var(--accent-text); }
.wc-foot .spacer{ margin-left:auto; }

/* ── BOTTOM SHEET ── */
.sheet-wrap{ position:absolute; inset:0; z-index:120; background:rgba(0,0,0,0); pointer-events:none; transition:background .25s; display:flex; align-items:flex-end; }
.sheet-wrap.open{ background:rgba(0,0,0,.55); pointer-events:auto; backdrop-filter:blur(2px); }
.sheet{ width:100%; background:var(--bg-1); border-top-left-radius:24px; border-top-right-radius:24px; border-top:1px solid var(--line-2);
  padding:10px 18px calc(18px + env(safe-area-inset-bottom)); transform:translateY(100%); transition:transform .28s cubic-bezier(.2,.7,.3,1);
  max-height:88%; overflow-y:auto; box-shadow:0 -20px 60px rgba(0,0,0,.5); }
.sheet-wrap.open .sheet{ transform:none; }
.sheet-grab{ width:38px; height:4px; border-radius:2px; background:var(--line-3); margin:0 auto 14px; }
.sheet-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.sheet-title{ font-family:var(--font-display); font-size:22px; letter-spacing:.5px; }
.sheet-label{ font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-2); margin:16px 0 10px; display:block; }
.opt-row{ display:flex; gap:8px; flex-wrap:wrap; }
.opt{ font-family:var(--font-mono); font-size:13px; font-weight:700; color:var(--ink-2); background:var(--bg-2); border:1px solid var(--line-2);
  border-radius:11px; padding:11px 15px; cursor:pointer; transition:all .15s; }
.opt.on{ color:var(--accent-ink); background:var(--accent); border-color:var(--accent); }
.opt.amber.on{ background:var(--warn); border-color:var(--warn); color:#07080A; }
.invite-chip{ display:flex; align-items:center; gap:9px; background:var(--bg-2); border:1px solid var(--line-2); border-radius:12px; padding:9px 11px; cursor:pointer; transition:all .15s; }
.invite-chip.on{ border-color:var(--accent); background:var(--accent-12); }
.invite-chip .ck{ width:20px; height:20px; border-radius:6px; border:1.5px solid var(--line-3); display:flex; align-items:center; justify-content:center; color:var(--accent-ink); flex:none; }
.invite-chip.on .ck{ background:var(--accent); border-color:var(--accent); }
.sheet .solid-btn{ width:100%; padding:16px; margin-top:22px; letter-spacing:1.5px; }

/* ── TOAST ── */
.toast{ position:absolute; left:50%; bottom:88px; transform:transl(-50%,12px); translate:-50% 12px; z-index:200;
  background:var(--ink-0); color:var(--bg-0); font-family:var(--font-mono); font-weight:700; font-size:13px;
  padding:12px 18px; border-radius:12px; opacity:0; pointer-events:none; transition:opacity .25s, translate .25s; box-shadow:0 10px 30px rgba(0,0,0,.4); white-space:nowrap; }
.toast.show{ opacity:1; translate:-50% 0; }

/* back button */
.back-btn{ display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:10px; background:var(--bg-2);
  border:1px solid var(--line-2); color:var(--ink-0); cursor:pointer; }
.back-btn:hover{ border-color:var(--line-3); }
</style>

  body { background:#0a0b0d; display:flex; align-items:center; justify-content:center; }
